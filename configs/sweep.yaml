# Output: a unique run_id/ folder with:
# the exact config copied in
# a manifest of all “cell jobs” (one row per simulation)
# Responsibilities
# define parameter ranges + sampling strategy
# define model choice (SPM/DFN), protocol templates, number of cycles
# define output schema version + random seed

run:
  run_id: "demo_001"
  seed: 123
  out_dir: "data"

sim:
  model: "SPM"         # keep fast for MVP
  n_cycles: 50
  dt_max: 10.0         # solver hint (you can ignore initially)
  solver: "casadi"     # placeholder, doesn’t need to be used yet

sweep:
  n_cells: 200
  c_rates: [0.5, 1.0, 2.0]
  temperatures_C: [10, 25, 40]
  dod_windows:
    - [0.2, 0.8]
    - [0.1, 0.9]
  rest_minutes: [0, 10]
  param_noise:
    enabled: true
    sigma_frac: 0.03   # 3% multiplicative noise on selected params
    keys: ["C_n", "C_p"]   # placeholder param names (you can map later)

output:
  jobs_path: "jobs/jobs.parquet"